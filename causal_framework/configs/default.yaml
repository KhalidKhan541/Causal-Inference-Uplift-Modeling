# Data Configuration
data:
  treatment_column: "treatment"
  outcome_column: "outcome"
  customer_id_column: "customer_id"
  date_column: "date"
  train_ratio: 0.7
  test_ratio: 0.3
  random_state: 42

# Features
features:
  numeric_columns:
    - "age"
    - "income"
    - "tenure_months"
    - "purchase_frequency"
    - "avg_order_value"
    - "total_spend"
    - "support_tickets"
    - "session_count"
    - "days_since_last_purchase"
  categorical_columns:
    - "gender"
    - "region"
    - "customer_segment"
    - "acquisition_channel"
    - "contract_type"
  confounders:
    - "age"
    - "income"
    - "tenure_months"
    - "customer_segment"

# A/B Test Design
ab_test:
  significance_level: 0.05
  power: 0.8
  min_detectable_effect: 0.02
  baseline_rate: 0.15
  test_duration_days: 14
  control_ratio: 0.5
  stratification_columns:
    - "customer_segment"
    - "region"

# Propensity Score Matching
propensity:
  method: "logistic_regression"
  caliper: 0.05
  n_neighbors: 1
  with_replacement: true
  common_support: true
  standardized: true

# Causal Inference (DoWhy)
causal:
  method: "backdoor"
  estimand_type: "ATE"
  test_significance: true
  refutation_methods:
    - "random_common_cause"
    - "placebo_treatment"
    - "data_subset"

# Uplift Models
uplift:
  t_learner:
    base_model: "gradient_boosting"
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.05
  s_learner:
    base_model: "gradient_boosting"
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.05
  x_learner:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.05
    propensity_model: "logistic_regression"
  evaluation:
    metric: "qini"
    cv_folds: 5

# Power Analysis
power_analysis:
  effect_sizes: [0.01, 0.02, 0.05, 0.10, 0.20]
  sample_sizes: [100, 250, 500, 1000, 2500, 5000, 10000, 25000, 50000]
  significance_levels: [0.01, 0.05, 0.10]

# Output
output:
  reports_dir: "outputs/reports"
  plots_dir: "outputs/plots"
  save_model: true
